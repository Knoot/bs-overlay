name: Pipeline

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build release bundle
        run: npm run build:release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose build
        run: docker compose -f docker-compose.yml build overlay

      - name: Upload release artifact
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: overlay-index-html
          path: dist/overlay/release/index.html

  release:
    needs: checks
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref == 'refs/heads/dev' && 'dev' || github.ref }}
      cancel-in-progress: false

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: overlay-index-html
          path: dist/overlay/release

      - name: Resolve release metadata
        id: release_meta
        uses: actions/github-script@v7
        with:
          script: |
            const isTag = context.ref.startsWith('refs/tags/');
            const isDevBranch = context.ref === 'refs/heads/dev';

            if (isTag) {
              const tagName = context.ref.replace('refs/tags/', '');
              core.setOutput('tag_name', tagName);
              core.setOutput('release_name', tagName);
              core.setOutput('prerelease', 'false');
              core.setOutput('create_tag', 'false');
              return;
            }

            if (!isDevBranch) {
              core.setFailed('Release job supports tag refs and the dev branch only.');
              return;
            }

            const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const prefix = `dev-${today}-`;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            let maxIndex = 0;

            for (const release of releases) {
              const tagName = release.tag_name || '';
              if (!tagName.startsWith(prefix)) {
                continue;
              }

              const suffix = tagName.slice(prefix.length);
              const parsed = Number.parseInt(suffix, 10);
              if (Number.isFinite(parsed)) {
                maxIndex = Math.max(maxIndex, parsed);
              }
            }

            const nextIndex = String(maxIndex + 1).padStart(2, '0');
            const tagName = `${prefix}${nextIndex}`;

            core.setOutput('tag_name', tagName);
            core.setOutput('release_name', tagName);
            core.setOutput('prerelease', 'true');
            core.setOutput('create_tag', 'true');

      - name: Create prerelease tag
        if: steps.release_meta.outputs.create_tag == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${{ steps.release_meta.outputs.tag_name }}`,
              sha: context.sha
            });

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          files: dist/overlay/release/index.html
